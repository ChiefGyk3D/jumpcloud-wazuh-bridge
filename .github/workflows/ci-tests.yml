name: CI - Tests

on:
  push:
    branches: [ master, main, develop, copilot/** ]
  pull_request:
    branches: [ master, main, develop ]
  workflow_dispatch:

jobs:
  test:
    name: Test Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13', '3.14']

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade "pip>=25.3"
        pip install -r requirements.txt
        pip install pytest pytest-cov

    - name: Run tests with coverage
      run: |
        pytest tests/ -v --cov=jumpcloud_wazuh_bridge --cov-report=xml --cov-report=term

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v5
      if: matrix.python-version == '3.14'
      with:
        file: ./coverage.xml
        flags: unittests
        fail_ci_if_error: false
      env:
        CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  lint:
    name: Lint and Security Check
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.14'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade "pip>=25.3"
        pip install -r requirements.txt
        pip install ruff bandit[toml] safety

    - name: Lint with Ruff
      run: |
        ruff check jumpcloud_wazuh_bridge/ tests/ --output-format=github
      continue-on-error: true

    - name: Security check with Bandit
      run: |
        bandit -r jumpcloud_wazuh_bridge/ -f json -o bandit-report.json
      continue-on-error: true

    - name: Check for known vulnerabilities
      run: |
        safety check --json
      continue-on-error: true

    - name: Upload Bandit report
      uses: actions/upload-artifact@v5
      if: always()
      with:
        name: bandit-security-report
        path: bandit-report.json
